# =============================================================================
# lidar_stick_localization.yaml
#   Livox MID360 + lidar_stick_map (GLIM 製 PCD) 用のローカライゼーション設定。
#   汎用の param/localization.yaml をベースに、この環境向けに値を調整したもの。
#   launch: launch/lidar_stick_localization.launch.py
# =============================================================================
/**:
    ros__parameters:
      # ---- レジストレーション (スキャンマッチング) --------------------------
      registration_method: "NDT_OMP"        # NDT_OMP / GICP_OMP / VGICP (small_gicp ビルド時)
      score_threshold: 2.0
      ndt_resolution: 1.0                    # 屋内で精度が要る場合は 0.5 程度に下げる
      ndt_step_size: 0.1
      ndt_num_threads: 4
      ndt_max_iterations: 35
      gicp_corr_randomness: 20
      gicp_max_correspondence_distance: 2.0
      vgicp_voxel_resolution: 1.0
      transform_epsilon: 0.01
      voxel_leaf_size: 0.2                   # 入力スキャンのダウンサンプル
      scan_max_range: 70.0                   # MID360 の有効レンジに合わせる
      scan_min_range: 0.5                    # 自己反射の点を除外
      scan_period: 0.1

      # ---- 地図 -------------------------------------------------------------
      use_pcd_map: true
      # 既定はコンテナ内パス。launch 引数 map_path で上書き可能。
      map_path: "/root/colcon_ws/lidar_stick_map/lidar_stick_map.pcd"

      # ---- 初期姿勢 (map 原点・正対) ----------------------------------------
      set_initial_pose: true
      initial_pose_x: 0.0
      initial_pose_y: 0.0
      initial_pose_z: 0.0
      initial_pose_qx: 0.0
      initial_pose_qy: 0.0
      initial_pose_qz: 0.0
      initial_pose_qw: 1.0                   # 単位クォータニオン (汎用 yaml の 0.0 は無効値なので修正)

      # ---- オドメトリ予測 ---------------------------------------------------
      # 外部オドメトリ (odom->base_link TF) を持たない単体構成なので false。
      use_odom: false
      use_twist_prediction: false
      twist_prediction_use_angular_velocity: true
      max_twist_prediction_dt: 0.5

      # ---- IMU --------------------------------------------------------------
      # まずは純 NDT で立ち上げる。MID360 の IMU を使うなら true にし、
      # launch 側で base_link->livox_frame と livox_frame->imu_link の TF を確認すること。
      use_imu: false
      use_imu_preintegration: true
      imu_preintegration_use_base_frame_transform: false
      imu_prediction_correction_guard_translation_m: 2.0
      imu_prediction_correction_guard_yaw_deg: 4.0

      # ---- 再初期化 (ロスト検知) --------------------------------------------
      enable_reinitialization_request_output: true
      enable_reinitialization_request_latch: true
      reinitialization_trigger_threshold: 0.95
      reinitialization_trigger_gap_scale_sec: 30.0
      reinitialization_trigger_seed_translation_scale_m: 100.0
      reinitialization_trigger_reject_streak_scale: 200.0
      reinitialization_trigger_fitness_explosion_threshold: 1000.0

      # ---- 出力 / TF --------------------------------------------------------
      enable_debug: true
      predict_pose_from_previous_delta: true
      reject_above_score_threshold: true
      # false: map->base_link を直接出力 (odom が無い単体構成向け)
      # true : map->odom を出力 (別途 odom->base_link を出すオドメトリが必要)
      enable_map_odom_tf: false
      global_frame_id: map
      odom_frame_id: odom
      base_frame_id: base_link
      enable_timer_publishing: false
      pose_publish_frequency: 30.0
